program: sae_sweep.py
project: list-comp
method: grid
metric:
  name: explained_variance
  goal: maximize

parameters:
  d_sae:
    values: [50, 100, 150, 200, 256]
  top_k:
    value: 1
  lr:
    values: [1e-4, 3e-4, 1e-3]
  n_steps:
    value: 50000
  warmup_steps:
    value: 1000
  batch_size:
    value: 4096
  seed:
    values: [42, 43, 44]

# Top-k=1 sweep: 6 d_sae × 3 lr × 3 seeds = 54 runs
