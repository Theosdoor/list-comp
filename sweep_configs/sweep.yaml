program: scripts/sweep_sae.py
project: list-comp
method: grid
metric:
  name: final_loss
  goal: minimize

parameters:
  d_sae:
    values: [100, 128]
  top_k:
    values: [3, 4, 5]
  lr:
    values: [1e-4, 3e-4, 1e-3]
  n_steps:
    value: 75000
  warmup_steps:
    value: 1000
  batch_size:
    value: 4096
  seed:
    values: [42, 43, 44]  # 3 repeats with different seeds

# Grid search will run all combinations
# 2 d_sae × 3 top_k × 3 lr × 3 seeds = 54 runs
