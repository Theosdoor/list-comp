# wandb sweep sweeps/sweep.yaml

program: scripts/sweep_sae.py
project: btksae_sweep
method: bayes
metric:
  name: sae_patched_task_accuracy
  goal: maximize

parameters:
  d_sae:
    values: [64, 128, 192, 256, 320, 384, 448, 512]
  top_k:
    distribution: int_uniform
    min: 1
    max: 5
  lr:
    distribution: log_uniform_values
    min: 1e-5
    max: 1e-2
  n_steps:
    value: 75000
  warmup_steps:
    value: 1000
  batch_size:
    value: 4096
  seed:
    values: [0]  # FOR GRID: average over different seeds

